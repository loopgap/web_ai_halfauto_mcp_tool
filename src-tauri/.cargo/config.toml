# ═══════════════════════════════════════════════
# Cargo 构建优化配置
# ═══════════════════════════════════════════════

[build]
# 使用 sccache 加速编译缓存复用（sccache 路径需在 PATH 中）
# rustc-wrapper = "sccache"  # 注释：sccache 安装完成后取消注释

# Windows: 使用 LLD 链接器 + 链接优化
[target.x86_64-pc-windows-msvc]
linker = "rust-lld.exe"
rustflags = [
    "-C", "link-arg=/OPT:REF",
    "-C", "link-arg=/OPT:ICF",
]

# Windows GNU: 优化链接
[target.x86_64-pc-windows-gnu]
rustflags = [
    "-C", "link-arg=-Wl,--gc-sections",
]

# Linux: 优化链接
[target.x86_64-unknown-linux-gnu]
rustflags = ["-C", "link-arg=-Wl,--gc-sections"]

[net]
git-fetch-with-cli = true

[registries.crates-io]
protocol = "sparse"

[profile.dev]
# 调试符号分离到单独文件，不打入二进制，减少 40-60% 体积
split-debuginfo = "unpacked"