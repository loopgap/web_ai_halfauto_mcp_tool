name: Release

# 标准 Tauri 发布工作流
# 触发方式: 推送形如 v* 的 tag
#   统一发布:   git tag v0.1.0 && git push origin v0.1.0
#   仅 Linux:   git tag v0.1.0-linux && git push origin v0.1.0-linux
#   仅 Windows: git tag v0.1.0-windows && git push origin v0.1.0-windows

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.id }}
      tag_name: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        id: create
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: AI Workbench ${{ github.ref_name }}
          draft: true
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          generate_release_notes: true

  build-tauri:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            tag_suffix: linux
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            tag_suffix: windows
    # 根据 tag 名称决定是否跳过该平台
    # v0.1.0       → 构建全部
    # v0.1.0-linux → 仅构建 linux
    # v0.1.0-windows → 仅构建 windows
    if: >-
      (!contains(github.ref_name, '-linux') && !contains(github.ref_name, '-windows'))
      || (matrix.tag_suffix == 'linux' && contains(github.ref_name, '-linux'))
      || (matrix.tag_suffix == 'windows' && contains(github.ref_name, '-windows'))
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: "--max-old-space-size=4096"
        with:
          projectPath: .
          tagName: ${{ github.ref_name }}
          releaseName: "AI Workbench ${{ github.ref_name }}"
          releaseId: ${{ needs.create-release.outputs.release_id }}
          # 标准 Tauri 产物:
          # Linux: .deb, .AppImage
          # Windows: .msi, .exe (NSIS)
          # macOS: .dmg, .app (如果添加 macOS matrix)

  publish-release:
    needs: [create-release, build-tauri]
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false,
            });
