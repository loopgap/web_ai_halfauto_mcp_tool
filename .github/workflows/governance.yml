name: Governance Pipeline

on:
  push:
    paths:
      - "governance/**"
      - "scripts/**"
      - "package.json"
      - ".github/workflows/governance.yml"
  pull_request:
    paths:
      - "governance/**"
      - "scripts/**"
      - "package.json"
      - ".github/workflows/governance.yml"

jobs:
  governance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Environment check
        run: pnpm env:check

      - name: Governance validate
        run: pnpm governance:validate

      - name: Generate evidence pack
        run: pnpm governance:evidence

      - name: Upload evidence artifact
        uses: actions/upload-artifact@v4
        with:
          name: governance-evidence-pack
          path: governance/examples/evidence-pack.generated.md
